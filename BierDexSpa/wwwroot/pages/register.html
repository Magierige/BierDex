<main>
    <div class="max-w-md mx-auto py-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tight text-gray-900 uppercase">Welkom terug</h1>
            <p class="text-gray-500 mt-2">Log in op je BierDex account</p>
            <div class="w-16 h-1 bg-[linear-gradient(135deg,#F2A900,#D18F00)] mx-auto mt-4 rounded-full"></div>
        </div>

        <form id="register-form" class="space-y-6">
            <div id="validationSummary" class="hidden text-red-500 text-sm font-medium bg-red-50 p-3 rounded-lg" role="alert"></div>

            <div>
                <label for="email" class="block text-xs font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">Emailadres</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-gray-50/50"
                       autocomplete="username" placeholder="naam@voorbeeld.nl" />
                <span id="emailError" class="text-red-500 text-xs mt-1 block ml-1"></span>
            </div>

            <div>
                <label for="password" class="block text-xs font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">Wachtwoord</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-gray-50/50"
                       autocomplete="current-password" placeholder="••••••••" />
                <span id="passwordError" class="text-red-500 text-xs mt-1 block ml-1"></span>
            </div>

            <button type="submit" class="w-full py-4 rounded-xl bg-[linear-gradient(135deg,#F2A900,#D18F00)] text-white font-black text-lg shadow-xl shadow-amber-200/50 hover:scale-[1.02] active:scale-95 transition-all">
                REGISTREREN
            </button>
            <p id="register-error" class="error-message"></p>
        </form>

        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <p class="text-gray-500">
                Heb je al een account?
                <a href="/login" class="font-black text-amber-600 hover:text-amber-700 underline decoration-2 underline-offset-4">
                    Log in
                </a>
            </p>
        </div>
    </div>
</main>
