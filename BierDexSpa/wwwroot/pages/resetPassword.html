<main>
    <div class="max-w-md mx-auto py-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tight text-gray-900 uppercase">Wachtwoord resetten</h1>
            <p class="text-gray-500 mt-2">Stel een nieuw, veilig wachtwoord in voor je account.</p>
            <div class="w-16 h-1 bg-[linear-gradient(135deg,#F2A900,#D18F00)] mx-auto mt-4 rounded-full"></div>
        </div>

        <form id="reset-password-form" class="space-y-5">

            <div>
                <label for="password" class="block text-xs font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">Nieuw Wachtwoord</label>
                <input id="password" name="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-white" autocomplete="new-password" aria-required="true" placeholder="••••••••" />
                <span class="text-red-500 text-xs mt-1 block ml-1"></span>
            </div>

            <div>
                <label for="confirm-password" class="block text-xs font-black text-gray-400 mb-1 uppercase tracking-widest ml-1">Bevestig Wachtwoord</label>
                <input id="confirm-password" name="confirm-password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-white" autocomplete="new-password" aria-required="true" placeholder="••••••••" />
                <span class="text-red-500 text-xs mt-1 block ml-1"></span>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full py-4 rounded-xl bg-[linear-gradient(135deg,#F2A900,#D18F00)] text-white font-black text-lg shadow-xl shadow-amber-200/50 hover:scale-[1.02] active:scale-95 transition-all">
                    WACHTWOORD OPSLAAN
                </button>
            </div>
            <p id="reset-password-error" class="error-message"></p>
        </form>
    </div>
</main>
