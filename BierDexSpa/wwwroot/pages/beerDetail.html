<main class="max-w-6xl mx-auto p-6 md:py-12">
    <!-- Back Button -->
    <a href="/home" class="inline-flex items-center gap-2 text-sm font-bold text-gray-500 hover:text-amber-600 transition-colors mb-8 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        TERUG NAAR OVERZICHT
    </a>

    <div class="flex flex-col md:flex-row gap-12 items-start">
        <!-- Left: Image Section -->
        <div class="w-full md:w-1/2 sticky top-24">
            <div class="relative aspect-square bg-white border border-gray-100 rounded-[3rem] shadow-sm flex items-center justify-center p-12 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-amber-50/50 to-transparent"></div>
                <img id="beer-detail-img" class="relative z-10 w-full h-full object-contain" src="" alt="Bier afbeelding" />

                <!-- Floating Alcohol Tag -->
                <div class="absolute bottom-8 right-8 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-xl">
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Alcohol</p>
                    <p id="beer-detail-abv" class="text-2xl font-black"></p>
                </div>
            </div>
        </div>

        <!-- Right: Content Section -->
        <div class="w-full md:w-1/2 space-y-8">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <span id="beer-detail-type" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-xs font-black uppercase tracking-widest"></span>
                    <span class="flex items-center gap-1 text-amber-500 font-bold">
                        ★ <span id="beer-detail-rating"></span>
                    </span>
                </div>
                <h1 id="beer-detail-name" class="text-5xl md:text-6xl font-black text-gray-900 leading-tight uppercase tracking-tighter"></h1>
                <p class="text-xl text-gray-500 mt-2 font-medium">Barcode: <span id="beer-detail-barcode"></span></p>
            </div>
        </div>
    </div>
    <!-- Add this after the closing </div> of your Content Section -->
    <div class="mt-16 border-t border-gray-100 pt-12">
        <h2 class="text-3xl font-black text-gray-900 mb-8 uppercase tracking-tighter">Reviews</h2>

        <div class="mt-12 bg-gray-50 p-8 rounded-[2rem] border border-gray-100">
            <h3 class="text-2xl font-black text-gray-900 mb-6 uppercase tracking-tighter">Schrijf een review</h3>
            <form id="review-form" class="space-y-4">
                <div class="flex flex-col gap-2">
                    <label for="review-rating" class="text-sm font-bold text-gray-600 uppercase">Rating</label>
                    <select id="review-rating" name="rating" class="w-full md:w-32 p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-amber-500 outline-none font-bold">
                        <option value="5">★ 5</option>
                        <option value="4">★ 4</option>
                        <option value="3">★ 3</option>
                        <option value="2">★ 2</option>
                        <option value="1">★ 1</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label for="review-content" class="text-sm font-bold text-gray-600 uppercase">Jouw ervaring</label>
                    <textarea id="review-content" name="content" rows="3" class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-amber-500 outline-none" placeholder="Wat vond je van dit biertje?"></textarea>
                </div>
                <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white font-black py-4 px-8 rounded-2xl transition-all active:scale-95">
                    POST REVIEW
                </button>
            </form>
        </div>

        <!-- Reviews Container -->
        <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Review cards will be injected here -->
        </div>

        <!-- Empty State (Hidden by default) -->
        <div id="no-reviews" class="hidden text-center py-12 bg-gray-50 rounded-3xl">
            <p class="text-gray-500 font-medium">Nog geen reviews voor dit bier.</p>
        </div>
    </div>
</main>
