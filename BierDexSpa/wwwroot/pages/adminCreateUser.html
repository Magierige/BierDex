<main class="max-w-7xl mx-auto p-6">
    <section class="space-y-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-black uppercase rounded-md tracking-tighter">Admin Panel</span>
                </div>
                <h1 class="text-4xl font-black tracking-tight text-gray-900 uppercase">Gebruikersbeheer</h1>
                <p class="text-gray-500 mt-2 italic">Beheer accounts en toegangsrechten van BierDex leden.</p>
            </div>
            <button id="openCreateUserBtn" class="px-8 py-4 bg-[linear-gradient(135deg,#F2A900,#D18F00)] text-white rounded-2xl font-black uppercase text-sm shadow-xl shadow-amber-200/50 hover:scale-[1.02] transition-all">
                Nieuwe Gebruiker
            </button>
        </div>

        <!-- Quick Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Totaal Gebruikers</p>
                <p class="text-3xl font-black text-gray-900" id="totalUsersCount">1,284</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <p class="text-xs font-black text-gray-400 uppercase tracking-widest mb-1">Nieuwe Verzoeken</p>
                <p class="text-3xl font-black text-gray-900" id="pendingUsersCount">0</p>
            </div>
        </div>

        <!-- User Table Card -->
        <div class="bg-white border border-gray-100 rounded-[2rem] overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 border-b border-gray-100">
                            <th class="px-6 py-4 text-[11px] font-black text-gray-400 uppercase tracking-widest">Gebruiker</th>
                            <th class="px-6 py-4 text-[11px] font-black text-gray-400 uppercase tracking-widest">Rol</th>
                            <th class="px-6 py-4 text-[11px] font-black text-gray-400 uppercase tracking-widest">Status</th>
                            <th class="px-6 py-4 text-[11px] font-black text-gray-400 uppercase tracking-widest">Datum</th>
                            <th class="px-6 py-4 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="divide-y divide-gray-50">
                        <!-- Example Row -->
                        <tr class="hover:bg-gray-50/30 transition-colors">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 font-black">JS</div>
                                    <div>
                                        <div class="font-black text-gray-900">Jan Stam</div>
                                        <div class="text-xs text-gray-500 font-medium">jan@biermail.nl</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full bg-gray-100 text-gray-600 text-[10px] font-black uppercase">Editor</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="flex items-center gap-1.5 text-[11px] font-black text-green-600 uppercase">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Actief
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500 font-medium">12 Mei, 2024</td>
                            <td class="px-6 py-4 text-right">
                                <button class="p-2 text-gray-400 hover:text-amber-600 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<!-- Create User Modal -->
<div id="createUserModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div id="modalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-[2.5rem] w-full max-w-lg shadow-2xl overflow-hidden p-10">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 class="text-3xl font-black text-gray-900 uppercase tracking-tight">Nieuwe Gebruiker</h2>
                <p class="text-gray-500 text-sm mt-1">Maak een nieuw account aan voor het team.</p>
            </div>
            <button id="closeModalBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400 hover:text-gray-900 transition-all">✕</button>
        </div>

        <form id="create-user-form" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">Gebruikersnaam</label>
                <input id="username" name="username" type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-gray-50/50" />
            </div>

            <div>
                <label for="email" class="block text-xs font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">Emailadres</label>
                <input id="email" name="email" type="email" required placeholder="naam@voorbeeld.nl" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-gray-50/50" />
            </div>

            <div>
                <label for="role" class="block text-xs font-black text-gray-400 mb-2 uppercase tracking-widest ml-1">Rol</label>
                <select id="role" name="role" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-amber-500 focus:ring-4 focus:ring-amber-500/10 outline-none transition-all bg-gray-50/50 font-bold text-gray-700">
                    <option value="User">Gebruiker</option>
                    <option value="Supplier">Leverancier</option>
                    <option value="Admin">Beheerder</option>
                </select>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 rounded-xl bg-gray-900 text-white font-black text-lg hover:bg-amber-600 transition-all shadow-lg">
                    GEBRUIKER AANMAKEN
                </button>
            </div>
            <p id="create-user-error" class="error-message"></p>
            <p id="create-user-success" class="success-message"></p>
        </form>
    </div>
</div>
