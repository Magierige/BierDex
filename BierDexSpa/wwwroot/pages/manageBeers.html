<main class="max-w-7xl mx-auto p-6">
    <section class="space-y-8">
        <!-- Header remains the same -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-gray-900 uppercase">My biertjes</h1>
                <p class="text-gray-500 mt-2 italic">Vind jouw volgende favoriet.</p>
            </div>
            <button id="openSearchBtn" class="px-6 py-3 bg-amber-500 text-white rounded-xl font-black uppercase text-sm">
                Zoek op Barcode
            </button>
        </div>

        <!-- This is where the JS will inject the cards -->
        <div id="beer-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </section>
</main>

<div id="searchModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div id="modalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-gray-900 uppercase tracking-tight">Bier Zoeken</h2>
            <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div class="space-y-4">
            <input id="barcodeInput" type="text" placeholder="Typ barcode (bijv. 123)" class="w-full px-4 py-4 rounded-xl border border-gray-200 outline-none bg-gray-50/50 text-lg font-bold" />
            <button id="searchBtn" class="w-full py-4 rounded-xl bg-gray-900 text-white font-black text-lg hover:bg-gray-800 transition-all">ZOEKEN</button>
        </div>

        <!-- RESULT SECTION -->
        <div id="searchResult" class="mt-8 pt-8 border-t border-gray-100 hidden">
            <div class="flex gap-6 items-center bg-gray-50 p-4 rounded-2xl">
                <div class="w-24 h-32 flex-shrink-0 bg-white rounded-xl overflow-hidden shadow-sm">
                    <img id="resultImg" class="w-full h-full object-contain p-2" src="" />
                </div>
                <div class="flex-grow">
                    <p id="resultType" class="text-[10px] font-black text-amber-600 uppercase tracking-widest"></p>
                    <h3 id="resultName" class="text-xl font-black text-gray-900 leading-tight mb-2"></h3>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
    <div id="editModalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden p-8">
        <h2 class="text-2xl font-black text-gray-900 uppercase mb-6">Bewerk Bier</h2>

        <form id="editBeerForm" class="space-y-4">
            <input type="hidden" id="editBeerId">
            <input type="hidden" id="editBeerBarcode">
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Naam</label>
                <input id="editName" type="text" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Type</label>
                <input id="editType" type="text" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Abv</label>
                <input id="editAbv" type="text" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>

            <div class="flex gap-4">
                <button type="submit" class="flex-grow py-4 rounded-xl bg-amber-500 text-white font-black hover:bg-amber-600 transition-all">OPSLAAN</button>
                <button type="button" id="deleteBeerBtn" class="px-6 py-4 rounded-xl bg-red-100 text-red-600 font-black hover:bg-red-200 transition-all">VERWIJDEREN</button>
            </div>
            <button type="button" id="closeEditModal" class="w-full text-gray-400 text-sm font-bold mt-2">Annuleren</button>
        </form>
    </div>
</div>

<!-- THE TEMPLATE: The 'Blueprint' for one beer card -->
