<main class="max-w-7xl mx-auto p-6">
    <section class="space-y-8">
        <!-- Header remains the same -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-gray-900 uppercase">My biertjes</h1>
                <p class="text-gray-500 mt-2 italic">Vind jouw volgende favoriet.</p>
            </div>

            <!-- NIEUW: TOGGLE SECTIE -->
            <div class="flex items-center gap-3 bg-gray-100 p-2 rounded-xl border border-gray-200">
                <span class="text-[10px] font-black uppercase text-gray-500 ml-2">Alleen niet goedgekeurd</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="unapprovedToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500"></div>
                </label>
            </div>

            <div class="flex gap-2">
                <button id="openSearchBtn" class="px-6 py-3 bg-amber-500 text-white rounded-xl font-black uppercase text-sm">
                    Zoek op Barcode
                </button>
                <button id="openAddModalBtn" class="px-6 py-3 bg-green-600 text-white rounded-xl font-black uppercase text-sm">
                    + Nieuw Bier
                </button>
            </div>
        </div>

        <!-- This is where the JS will inject the cards -->
        <div id="beer-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </section>
</main>

<!-- SEARCH MODAL -->
<div id="searchModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div id="modalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-gray-900 uppercase tracking-tight">Bier Zoeken</h2>
            <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div class="space-y-4">
            <div class="flex gap-2">
                <input id="barcodeInput" type="text" placeholder="Typ barcode..." class="flex-grow px-4 py-4 rounded-xl border border-gray-200 outline-none bg-gray-50/50 text-lg font-bold" />
                <!-- NEW CAMERA BUTTON -->
                <button id="startScanBtn" class="px-4 bg-amber-100 text-amber-600 rounded-xl hover:bg-amber-200 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>

            <!-- NEW SCANNER CONTAINER -->
            <div id="reader" class="overflow-hidden rounded-2xl bg-gray-100 hidden"></div>

            <button id="searchBtn" class="w-full py-4 rounded-xl bg-gray-900 text-white font-black text-lg hover:bg-gray-800 transition-all">ZOEKEN</button>
        </div>

        <!-- RESULT SECTION -->
        <div id="searchResult" class="mt-8 pt-8 border-t border-gray-100 hidden">
            <div class="flex gap-6 items-center bg-gray-50 p-4 rounded-2xl">
                <div class="w-24 h-32 flex-shrink-0 bg-white rounded-xl overflow-hidden shadow-sm">
                    <img id="resultImg" class="w-full h-full object-contain p-2" src="" />
                </div>
                <div class="flex-grow">
                    <p id="resultType" class="text-[10px] font-black text-amber-600 uppercase tracking-widest"></p>
                    <h3 id="resultName" class="text-xl font-black text-gray-900 leading-tight mb-2"></h3>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
    <div id="editModalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden p-8">
        <h2 class="text-2xl font-black text-gray-900 uppercase mb-6">Bewerk Bier</h2>

        <form id="editBeerForm" class="space-y-4">
            <input type="hidden" id="editBeerId">
            <input type="hidden" id="editBeerBarcode">
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Naam</label>
                <input id="editName" type="text" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Type</label>
                <input id="editType" type="text" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-gray-400">Abv</label>
                <input id="editAbv" type="number" step="0.1" class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>

            <div class="flex gap-4">
                <button type="submit" class="flex-grow py-4 rounded-xl bg-amber-500 text-white font-black hover:bg-amber-600 transition-all">OPSLAAN</button>
                <button type="button" id="deleteBeerBtn" class="px-6 py-4 rounded-xl bg-red-100 text-red-600 font-black hover:bg-red-200 transition-all">VERWIJDEREN</button>
            </div>
            <button type="button" id="closeEditModal" class="w-full text-gray-400 text-sm font-bold mt-2">Annuleren</button>
        </form>
    </div>
</div>

<!-- ADD BEER MODAL -->
<div id="addBeerModal" class="hidden fixed inset-0 z-[120] flex items-center justify-center p-4">
    <div id="addModalOverlay" class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden p-8">
        <h2 class="text-2xl font-black text-gray-900 uppercase mb-6">Nieuw Bier Toevoegen</h2>

        <form id="addBeerForm" class="space-y-4">
            <div>
                <label for="barcode" class="text-[10px] font-black uppercase text-gray-400">Barcode</label>
                <input id="addBarcode" name="barcode" type="number" required class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label for="name" class="text-[10px] font-black uppercase text-gray-400">Naam</label>
                <input id="addName" name="name" type="text" required class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label for="type" class="text-[10px] font-black uppercase text-gray-400">Type (bijv. IPA, Tripel)</label>
                <input id="addType" name="type" type="text" required class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label for="abv" class="text-[10px] font-black uppercase text-gray-400">Alcoholpercentage (ABV)</label>
                <input id="addAbv" name="abv" type="number" step="0.1" required class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>
            <div>
                <label for="image" class="text-[10px] font-black uppercase text-gray-400">Afbeelding</label>
                <input id="addImage" name="image" type="file" accept="image/*" required class="w-full px-4 py-2 rounded-xl border border-gray-200 outline-none bg-gray-50" />
            </div>

            <button type="submit" class="w-full py-4 rounded-xl bg-green-600 text-white font-black hover:bg-green-700 transition-all uppercase">Bier Opslaan</button>
            <button type="button" id="closeAddModal" class="w-full text-gray-400 text-sm font-bold mt-2">Annuleren</button>
        </form>
    </div>
</div>
