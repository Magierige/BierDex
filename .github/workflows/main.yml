name: Enforce PR source main

on:
  pull_request:
    branches: [ "main" ]

jobs:
  check-source-branch-main:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          echo "Source branch: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != "release/*" && "${{ github.head_ref }}" != hotfix/* ]]; then
            echo "❌ PRs to main must come from 'release or hotfix'"
            exit 1
          fi
