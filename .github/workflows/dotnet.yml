# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  pull_request:
    branches: [ "main", "dev", "acceptance" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --configuration Release --no-restore

    # Installeer de Playwright browsers via het specifieke testproject
    - name: Install Playwright Browsers
      run: |
        dotnet build BierDexTestProject/BierDexTestProject.csproj
        dotnet tool install --global Microsoft.Playwright.CLI || true
        playwright install --with-deps --project BierDexTestProject
        
    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal
