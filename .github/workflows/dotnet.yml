# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  pull_request:
    branches: [ "main", "dev", "acceptance" ]

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --configuration Release --no-restore

    # Maak een lokale tool manifest aan en installeer de exacte Playwright CLI die bij jouw NuGet pakket hoort
    - name: Install Playwright CLI & Browser
      run: |
        dotnet new tool-manifest --force
        dotnet tool install Microsoft.Playwright.CLI
        dotnet tool run playwright install --with-deps

    - name: Run Tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    # Optioneel: Playwright bewaart traces vaak in de bin/ map bij .NET, pas dit aan indien nodig
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: BierDexTestProject/bin/Release/net10.0/playwright-report/
        retention-days: 30
